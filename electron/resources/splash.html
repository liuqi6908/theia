<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --bg: #09090b;
      --line: #27272a;
      --muted: #a1a1aa;
      --green: #3df599;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: grid;
      place-items: center;
      cursor: default;
    }

    .splash {
      position: relative;
      width: 800px;
      height: 480px;
      overflow: hidden;
      color: #fafafa;
      background:
        linear-gradient(135deg, #050506 0%, var(--bg) 48%, #030304 100%);
      border: 1px solid rgba(63, 63, 70, 0.86);
      border-radius: 8px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.5);
      isolation: isolate;
      -webkit-app-region: drag;
    }

    .matrix {
      position: absolute;
      inset: 0;
      opacity: 0.56;
      background-image:
        radial-gradient(circle at 12px 18px, rgba(244, 244, 245, 0.34) 0 1px, transparent 1.8px),
        radial-gradient(circle at 58px 36px, rgba(61, 245, 153, 0.22) 0 1.2px, transparent 2px),
        radial-gradient(circle at 91px 76px, rgba(161, 161, 170, 0.18) 0 1px, transparent 1.8px),
        radial-gradient(circle at 132px 24px, rgba(244, 244, 245, 0.22) 0 0.9px, transparent 1.6px);
      background-size: 150px 120px;
      mask-image: radial-gradient(ellipse at 42% 42%, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.55) 58%, transparent 94%);
      z-index: -3;
    }

    .glow {
      position: absolute;
      inset: -120px -80px;
      background:
        radial-gradient(circle at 20% 22%, rgba(61, 245, 153, 0.055), transparent 28%),
        radial-gradient(circle at 72% 66%, rgba(61, 245, 153, 0.025), transparent 30%);
      filter: blur(18px);
      z-index: -4;
    }

    .scan {
      position: absolute;
      top: -52%;
      left: -58%;
      width: 108%;
      height: 214%;
      background:
        radial-gradient(ellipse at center, rgba(61, 245, 153, 0.29) 0%, rgba(61, 245, 153, 0.13) 42%, transparent 76%);
      filter: blur(30px);
      opacity: 0.74;
      transform: translate3d(0, 0, 0) rotate(-10deg);
      animation: scan 10s ease-in-out infinite;
      z-index: -2;
    }

    .shell {
      position: absolute;
      right: 48px;
      bottom: 72px;
      width: 314px;
      border: 1px solid rgba(63, 63, 70, 0.58);
      background: rgba(18, 18, 20, 0.46);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.22);
      opacity: 0.72;
      backdrop-filter: blur(12px);
    }

    .shell-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 34px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      color: #71717a;
      font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(61, 245, 153, 0.5);
    }

    .dot:nth-child(2) {
      background: rgba(234, 179, 8, 0.5);
    }

    .dot:nth-child(3) {
      background: rgba(239, 68, 68, 0.48);
      margin-right: 6px;
    }

    .shell-body {
      padding: 18px;
      font: 12px/1.7 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .line {
      display: flex;
      gap: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .prompt {
      color: rgba(61, 245, 153, 0.68);
      font-weight: 400;
    }

    .content {
      position: absolute;
      left: 54px;
      top: 56px;
      width: 530px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 52px;
    }

    .mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: rgba(24, 24, 27, 0.86);
    }

    .mark img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .brand-text {
      color: #f4f4f5;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0;
    }

    .version {
      margin-left: 2px;
      color: #71717a;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--green);
      font-size: 14px;
      font-weight: 400;
    }

    .eyebrow::before {
      width: 9px;
      height: 9px;
      content: "";
      background: var(--green);
      box-shadow: 0 0 22px rgba(61, 245, 153, 0.88);
    }

    .title {
      margin: 0;
      color: #fff;
      font-size: 50px;
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .tagline {
      margin: 20px 0 0;
      color: #f4f4f5;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0;
    }

    .description {
      width: 360px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
    }

    .status {
      position: absolute;
      left: 54px;
      right: 54px;
      bottom: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 24px;
      color: #b7b7bf;
      font-size: 13px;
      font-weight: 400;
    }

    .status-text {
      position: relative;
      width: 280px;
      height: 24px;
      overflow: hidden;
      letter-spacing: 0;
    }

    .status-line {
      position: absolute;
      inset: 0 auto auto 0;
      color: #b7b7bf;
      line-height: 24px;
      opacity: 0;
      transform: translateY(12px);
      animation: status-cycle 8s ease-in-out infinite;
    }

    .status-line:nth-child(2) {
      animation-delay: 2s;
    }

    .status-line:nth-child(3) {
      animation-delay: 4s;
    }

    .status-line:nth-child(4) {
      animation-delay: 6s;
    }

    .status-line strong {
      font-weight: 400;
    }

    img {
      pointer-events: none;
    }

    .loader {
      flex: 0 0 22px;
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.14);
      border-top-color: rgba(61, 245, 153, 0.82);
      border-radius: 50%;
      animation: spin 1.05s linear infinite;
    }

    @keyframes scan {
      0% {
        transform: translate3d(-10%, 8%, 0) rotate(-10deg) scale(0.92);
        opacity: 0.12;
      }

      28% {
        opacity: 0.76;
      }

      52% {
        transform: translate3d(82%, -2%, 0) rotate(-8deg) scale(1.08);
        opacity: 0.84;
      }

      76% {
        opacity: 0.58;
      }

      100% {
        transform: translate3d(168%, 10%, 0) rotate(-10deg) scale(0.96);
        opacity: 0.1;
      }
    }

    @keyframes status-cycle {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }

      8%,
      23% {
        opacity: 1;
        transform: translateY(0);
      }

      30%,
      100% {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <main class="splash" aria-label="ChatPython 正在启动">
    <div class="glow"></div>
    <div class="matrix"></div>
    <div class="scan"></div>

    <section class="content">
      <div class="brand">
        <div class="mark">
          <img src="logo.png" alt="" aria-hidden="true">
        </div>
        <div class="brand-text">ChatPython</div>
        <div class="version">v0.0.1</div>
      </div>

      <div class="eyebrow">AI 数据分析助手</div>
      <h1 class="title">专为社会科学打造</h1>
      <p class="tagline">No Pip. No Conda. Just Chat.</p>
      <p class="description">通过我们的自主 AI 智能体，跨越编程障碍，专注于您的研究逻辑。</p>
    </section>

    <aside class="shell" aria-hidden="true">
      <div class="shell-bar">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        ChatPython-agent
      </div>
      <div class="shell-body">
        <div class="line"><span class="prompt">user</span><span>分析社会调查数据</span></div>
        <div class="line"><span class="prompt">agent</span><span>构建变量、清洗缺失值</span></div>
        <div class="line"><span class="prompt">run</span><span>regression.summary()</span></div>
      </div>
    </aside>

    <div class="status">
      <span class="status-text" aria-live="polite" aria-label="正在启动研究工作台">
        <span class="status-line">正在启动 <strong>研究工作台</strong></span>
        <span class="status-line">正在加载 <strong>AI 智能体</strong></span>
        <span class="status-line">正在准备 <strong>数据分析环境</strong></span>
        <span class="status-line">正在连接 <strong>扩展服务</strong></span>
      </span>
      <div class="loader" aria-hidden="true"></div>
    </div>
  </main>
</body>

</html>
