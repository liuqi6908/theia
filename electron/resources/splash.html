<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --green: #3df599;
      --line: #27272a;
      --muted: #a1a1aa;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: grid;
      place-items: center;
      cursor: default;
    }

    .splash {
      position: relative;
      width: 480px;
      height: 288px;
      overflow: hidden;
      color: #fafafa;
      background:
        radial-gradient(circle at 22% 38%, rgba(61, 245, 153, 0.12), transparent 32%),
        linear-gradient(135deg, #050506 0%, #09090b 56%, #030304 100%);
      border: 1px solid rgba(63, 63, 70, 0.88);
      border-radius: 8px;
      box-shadow: 0 22px 64px rgba(0, 0, 0, 0.52);
      isolation: isolate;
    }

    .stars {
      position: absolute;
      inset: 0;
      opacity: 0.34;
      background-image:
        radial-gradient(circle at 24px 18px, rgba(244, 244, 245, 0.34) 0 1px, transparent 1.8px),
        radial-gradient(circle at 92px 72px, rgba(61, 245, 153, 0.18) 0 1px, transparent 1.8px),
        radial-gradient(circle at 148px 36px, rgba(161, 161, 170, 0.16) 0 1px, transparent 1.8px);
      background-size: 190px 140px;
      mask-image: radial-gradient(ellipse at 50% 46%, rgba(0, 0, 0, 0.85), transparent 78%);
      z-index: -4;
    }

    .ambient {
      position: absolute;
      top: -54%;
      left: -62%;
      width: 112%;
      height: 220%;
      background: radial-gradient(ellipse at center, rgba(61, 245, 153, 0.28), rgba(61, 245, 153, 0.12) 38%, transparent 72%);
      filter: blur(32px);
      opacity: 0.7;
      animation: ambient 11s ease-in-out infinite;
      z-index: -3;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.28), transparent 36%, rgba(0, 0, 0, 0.3)),
        radial-gradient(ellipse at center, transparent 48%, rgba(0, 0, 0, 0.48) 100%);
      z-index: -2;
    }

    .layout {
      position: absolute;
      inset: 36px 34px 52px;
      display: grid;
      grid-template-columns: 78px 1fr;
      align-items: center;
      gap: 24px;
    }

    .product-mark {
      position: relative;
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
    }

    .product-mark::after {
      position: absolute;
      inset: -15px;
      content: "";
      background: radial-gradient(circle, rgba(61, 245, 153, 0.2), transparent 64%);
      filter: blur(14px);
      z-index: -1;
    }

    .product-mark img {
      width: 78px;
      height: 78px;
      object-fit: contain;
      filter: drop-shadow(0 13px 26px rgba(0, 0, 0, 0.36)) drop-shadow(0 0 15px rgba(61, 245, 153, 0.26));
    }

    .copy {
      min-width: 0;
      max-width: 322px;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--green);
      font-size: 10px;
      font-weight: 700;
    }

    .label::before {
      width: 20px;
      height: 1px;
      content: "";
      background: rgba(61, 245, 153, 0.78);
      box-shadow: 0 0 16px rgba(61, 245, 153, 0.54);
    }

    .title {
      margin: 0;
      color: #ffffff;
      font-size: 32px;
      font-weight: 780;
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 7px 0 0;
      color: #f0f0f2;
      font-size: 15px;
      font-weight: 680;
      letter-spacing: 0;
    }

    .tagline {
      margin: 11px 0 0;
      color: #c4c4cc;
      font-size: 11px;
      line-height: 1.62;
    }

    .status {
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 20px;
      color: #c4c4cc;
      font-size: 12px;
      font-weight: 650;
    }

    .status-text {
      position: relative;
      width: 260px;
      height: 20px;
      overflow: hidden;
    }

    .status-line {
      position: absolute;
      inset: 0 auto auto 0;
      color: #c4c4cc;
      line-height: 20px;
      opacity: 0;
      transform: translateY(12px);
      animation: status-cycle 8s ease-in-out infinite;
    }

    .status-line:nth-child(2) {
      animation-delay: 2s;
    }

    .status-line:nth-child(3) {
      animation-delay: 4s;
    }

    .status-line:nth-child(4) {
      animation-delay: 6s;
    }

    .status-line strong {
      color: #f0f0f2;
      font-weight: 720;
    }

    img {
      pointer-events: none;
    }

    .loader {
      flex: 0 0 16px;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.14);
      border-top-color: rgba(61, 245, 153, 0.82);
      border-radius: 50%;
      animation: spin 1.05s linear infinite;
    }

    @keyframes ambient {
      0% {
        transform: translate3d(-8%, 6%, 0) rotate(-10deg) scale(0.94);
        opacity: 0.22;
      }

      50% {
        transform: translate3d(82%, -3%, 0) rotate(-8deg) scale(1.08);
        opacity: 0.78;
      }

      100% {
        transform: translate3d(162%, 7%, 0) rotate(-10deg) scale(0.96);
        opacity: 0.18;
      }
    }

    @keyframes status-cycle {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }

      8%,
      23% {
        opacity: 1;
        transform: translateY(0);
      }

      30%,
      100% {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <main class="splash" aria-label="ChatPython 正在启动">
    <div class="stars"></div>
    <div class="ambient"></div>
    <div class="vignette"></div>

    <section class="layout">
      <div class="product-mark">
        <img src="logo.png" alt="" aria-hidden="true">
      </div>

      <div class="copy">
        <div class="label">AI 数据分析助手</div>
        <h1 class="title">ChatPython</h1>
        <p class="subtitle">专为社会科学打造</p>
        <p class="tagline">No Pip. No Conda. Just Chat.<br>通过我们的自主 AI 智能体，跨越编程障碍，专注于您的研究逻辑。</p>
      </div>
    </section>

    <div class="status">
      <span class="status-text" aria-live="polite" aria-label="正在启动研究工作台">
        <span class="status-line">正在启动 <strong>研究工作台</strong></span>
        <span class="status-line">正在加载 <strong>AI 智能体</strong></span>
        <span class="status-line">正在准备 <strong>数据分析环境</strong></span>
        <span class="status-line">正在连接 <strong>扩展服务</strong></span>
      </span>
      <div class="loader" aria-hidden="true"></div>
    </div>
  </main>
</body>

</html>
